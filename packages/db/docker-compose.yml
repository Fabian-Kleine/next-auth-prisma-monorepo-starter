services:
  postgres:
    image: postgres:16
    container_name: next-auth-starter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres_app
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: next_auth_starter_dev
    ports:
      - "5432:5432"
    volumes:
      - next-auth-starter-postgres-data:/var/lib/postgresql/data
      - ./docker/init-shadow-db.sh:/docker-entrypoint-initdb.d/init-shadow-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_app -d next_auth_starter_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  next-auth-starter-postgres-data:
